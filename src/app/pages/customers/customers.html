<div class="page-container">
  <div class="page-header">
    <h2>👤 Customers</h2>
    <button class="btn btn-primary" (click)="openAdd()">+ Add Customer</button>
  </div>

  <div class="alert alert-danger" *ngIf="error">{{ error }}</div>

  <div *ngIf="loading" class="loading-container">
    <div class="spinner"></div>
    <span>Loading customers...</span>
  </div>

  <div class="table-responsive" *ngIf="!loading">
    <table class="table table-hover">
      <thead>
        <tr><th>#</th><th>Name</th><th>Mobile</th><th>Location</th><th>Found Via</th><th>Joined</th><th>Actions</th></tr>
      </thead>
      <tbody>
        <tr *ngFor="let c of customers; let i = index">
          <td class="text-muted">{{ i + 1 }}</td>
          <td><strong>{{ c.name }}</strong></td>
          <td><a href="tel:{{ c.mobile_number }}">{{ c.mobile_number }}</a></td>
          <td>{{ c.location }}</td>
          <td><span class="badge bg-info text-dark">{{ c.found_via }}</span></td>
          <td>{{ c.created_at | date:'short' }}</td>
          <td>
            <button class="btn btn-sm btn-outline-secondary me-1" (click)="openEdit(c)">✎ Edit</button>
            <button class="btn btn-sm btn-outline-danger" (click)="remove(c.id!)">🗑</button>
          </td>
        </tr>
        <tr *ngIf="customers.length === 0">
          <td colspan="7" class="text-center text-muted py-4">No customers yet.</td>
        </tr>
      </tbody>
    </table>
  </div>
</div>

<div *ngIf="showModal">
  <div class="modal-backdrop-custom" (click)="showModal=false"></div>
  <div class="modal-panel">
    <div class="modal-panel-header">
      <h5>{{ isEdit ? 'Edit Customer' : 'Add Customer' }}</h5>
      <button class="btn-close" (click)="showModal=false"></button>
    </div>
    <div class="modal-panel-body">
      <div class="row g-3">
        <div class="col-12">
          <label class="form-label">Name *</label>
          <input class="form-control" [(ngModel)]="form.name" placeholder="Full name">
        </div>
        <div class="col-12">
          <label class="form-label">Mobile Number *</label>
          <input class="form-control" [(ngModel)]="form.mobile_number" placeholder="01xxxxxxxxx">
        </div>
        <div class="col-12">
          <label class="form-label">Location *</label>
          <input class="form-control" [(ngModel)]="form.location" placeholder="City / District">
        </div>
        <div class="col-12">
          <label class="form-label">How did they find us? *</label>
          <select class="form-select" [(ngModel)]="form.found_via">
            <option *ngFor="let option of foundViaOptions" [value]="option">{{ option }}</option>
          </select>
        </div>
      </div>
    </div>
    <div class="modal-panel-footer">
      <button class="btn btn-secondary me-2" (click)="showModal=false">Cancel</button>
      <button class="btn btn-primary" (click)="save()">{{ isEdit ? 'Update' : 'Add' }}</button>
    </div>
  </div>
</div>
